<!DOCTYPE html>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #FAFAFA; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    .links a { color: #1a1a1a; text-decoration: none; font-size: 15px; font-weight: 500; padding: 10px 20px; border: 1px solid #ddd; border-radius: 8px; transition: all 0.2s; }
    .links a:hover { border-color: #1a1a1a; background: #1a1a1a; color: #fff; }
  </style>
</head>

  <div class="container">
    <h1>Anthony Calise</h1>
