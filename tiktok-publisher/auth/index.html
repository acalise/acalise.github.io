<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>if(location.hostname==="acalise.github.io"){document.write('<meta name="robots" content="noindex,nofollow">');location.replace("https://acalise.com"+location.pathname+location.search+location.hash);}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" href="https://acalise.com/tiktok-publisher/auth/">
  <title>TikTok Publisher &mdash; Authorization</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/png" sizes="96x96" href="/assets/favicon-96.png">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #FAFAFA; color: #333; padding: 48px 24px; max-width: 640px; margin: 0 auto; line-height: 1.6; }
    h1 { font-size: 24px; color: #1a1a1a; margin-bottom: 16px; }
    p { margin-bottom: 16px; }
    .box { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin: 24px 0; }
    .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 8px; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; word-break: break-all; background: #f4f4f4; padding: 12px; border-radius: 4px; user-select: all; }
    .err { color: #c00; }
    button { font-size: 14px; padding: 8px 16px; border: 1px solid #1a1a1a; background: #1a1a1a; color: #fff; border-radius: 6px; cursor: pointer; margin-top: 8px; }
    button:hover { background: #333; }
  </style>
</head>
<body>
  <h1>TikTok Publisher &mdash; Authorization</h1>
  <p id="msg">Reading authorization response&hellip;</p>
  <div id="result"></div>

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var code = params.get('code');
      var state = params.get('state');
      var scopes = params.get('scopes');
      var error = params.get('error');
      var errorDescription = params.get('error_description');
      var msg = document.getElementById('msg');
      var result = document.getElementById('result');

      if (error) {
        msg.innerHTML = '<span class="err">Authorization failed.</span>';
        result.innerHTML =
          '<div class="box"><div class="label">Error</div><div class="code">' +
          escapeHtml(error) + (errorDescription ? ' &mdash; ' + escapeHtml(errorDescription) : '') +
          '</div></div>';
        return;
      }

      if (!code) {
        msg.innerHTML = 'No authorization code in this URL. Start the auth flow from the local script.';
        return;
      }

      msg.innerHTML = 'Authorization successful. Copy the values below into the local script.';
      result.innerHTML =
        '<div class="box"><div class="label">Authorization code</div>' +
        '<div class="code" id="codeBox">' + escapeHtml(code) + '</div>' +
        '<button onclick="copyText(\'codeBox\')">Copy code</button></div>' +
        (state ? '<div class="box"><div class="label">State</div><div class="code">' + escapeHtml(state) + '</div></div>' : '') +
        (scopes ? '<div class="box"><div class="label">Granted scopes</div><div class="code">' + escapeHtml(scopes) + '</div></div>' : '');

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }
      window.copyText = function (id) {
        var el = document.getElementById(id);
        navigator.clipboard.writeText(el.textContent);
      };
    })();
  </script>
</body>
</html>
